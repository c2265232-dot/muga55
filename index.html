<!DOCTYPE html>
<html>
<head>
  <title>MUGA</title>
  <link rel="stylesheet" href="style.css">
  <link id="icon" rel="icon" href="">
  <script src="script.js" defer></script>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    🟢 <span>MUGA</span>
  </div>

  <input id="search" placeholder="Search games...">

  <button class="cloak" onclick="cloakTab()">🕶️</button>
</div>

<!-- CATEGORIES -->
<div class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('action')">Action</button>
  <button onclick="filterCategory('io')">IO</button>
  <button onclick="filterCategory('driving')">Driving</button>
  <button onclick="filterCategory('classic')">Classic</button>
  <button onclick="filterCategory('sports')">Sports</button>
</div>

<!-- GAME GRID -->
<div id="games" class="grid"></div>

</body>
</html>
<!-- COMMENTS PANEL -->
<div id="commentPanel" class="panel hidden">
  <div class="panel-content">
    <h2>Comments</h2>

    <div id="commentList"></div>

    <input id="commentInput" placeholder="Write a comment...">
    <button onclick="submitComment()">Post</button>

    <button onclick="closeComments()">Close</button>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="panel hidden">
  <div class="panel-content">
    <h2>Customize</h2>

    <label>Background</label>
    <input type="color" id="bgColor">

    <label>Card Color</label>
    <input type="color" id="cardColor">

    <label>Accent</label>
    <input type="color" id="accentColor">

    <button onclick="saveTheme()">Save</button>
    <button onclick="closeSettings()">Close</button>
  </div>
</div>

<!-- SETTINGS BUTTON -->
<button class="settingsBtn" onclick="openSettings()">⚙️</button>

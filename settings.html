<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
  <link id="icon" rel="icon" href="">
  <script src="script.js" defer></script>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Back</button>
  <h2>Settings</h2>
</div>

<div class="settingsPage">

  <h3>🎨 Theme</h3>
  <label>Background</label>
  <input type="color" id="bgColor">

  <label>Cards</label>
  <input type="color" id="cardColor">

  <label>Buttons</label>
  <input type="color" id="accentColor">

  <h3>🕶️ Tab Cloaking</h3>
  <label>Tab Name</label>
  <input id="tabName" placeholder="Google Classroom">

  <label>Icon URL</label>
  <input id="tabIcon" placeholder="Paste icon URL">

  <button onclick="saveTheme()">Save All</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
  <link id="icon" rel="icon" href="">
  <script src="script.js" defer></script>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Back</button>
  <h2>Settings</h2>
</div>

<div class="settingsPage">

  <h3>👤 Account</h3>
  <input id="username" placeholder="Username">
  <input id="password" placeholder="Password" type="password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Log In</button>

  <p id="currentUser"></p>

  <h3>🎨 Theme</h3>
  <label>Background</label>
  <input type="color" id="bgColor">

  <label>Cards</label>
  <input type="color" id="cardColor">

  <label>Buttons</label>
  <input type="color" id="accentColor">

  <label>Text</label>
  <input type="color" id="textColor">

  <h3>🕶️ Tab Cloaking</h3>
  <input id="tabName" placeholder="Tab name">
  <input id="tabIcon" placeholder="Icon URL">

  <button onclick="saveTheme()">Save All</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
  <link id="icon" rel="icon">
  <script src="script.js" defer></script>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅</button>
  <h2>Settings</h2>
</div>

<div class="settingsPage">

  <h3>🎨 Colors</h3>
  <label>Background</label>
  <input type="color" id="bgColor">

  <label>Cards</label>
  <input type="color" id="cardColor">

  <label>Buttons</label>
  <input type="color" id="accentColor">

  <label>Text</label>
  <input type="color" id="textColor">

  <h3>🔤 Text Style</h3>
  <label>Size</label>
  <input type="range" id="textSize" min="12" max="24">

  <label>Font</label>
  <select id="font">
    <option>Arial</option>
    <option>Verdana</option>
    <option>Courier New</option>
  </select>

  <h3>🖼️ Background Image</h3>
  <input id="bgImage" placeholder="Image URL">

  <h3>🕶️ Cloak</h3>
  <input id="tabName" placeholder="Tab name">
  <input id="tabIcon" placeholder="Icon URL">

  <button onclick="saveTheme()">Save</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
  <link id="icon" rel="icon" href="">
  <script src="script.js" defer></script>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">⬅ Back</button>
  <h2>Settings</h2>
</div>

<div class="settingsPage">

  <h3>👤 Account</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Log In</button>
  <p id="currentUser"></p>

  <h3>🎨 Theme Creator</h3>
  <input type="color" id="bgColor">
  <input type="color" id="cardColor">
  <input type="color" id="accentColor">
  <input type="color" id="textColor">

  <h3>🕶️ Cloak</h3>
  <input id="tabName" placeholder="Tab name">
  <input id="tabIcon" placeholder="Icon URL">

  <input id="themeName" placeholder="Theme name">

  <button onclick="saveTheme()">💾 Save Theme</button>

  <h3>📂 Saved Themes</h3>
  <select id="themeList"></select>
  <button onclick="loadTheme()">Apply</button>

</div>

</body>
</html>
